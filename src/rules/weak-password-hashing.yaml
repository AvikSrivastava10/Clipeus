rules:
  - id: patronus-weak-password-hash-js
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      A password appears to be hashed with a fast, general-purpose hash
      (md5/sha1/sha256). These are trivially brute-forced. Use a slow,
      salted password hash such as bcrypt, scrypt, or argon2.
    metadata:
      patronus-category: insecure-crypto
      patronus-ai-codegen: true
      patronus-remediation: "Use bcrypt.hash(password, 12) or argon2.hash(password)."
      cwe:
        - "CWE-916: Use of Password Hash With Insufficient Computational Effort"
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: crypto.createHash("md5").update($PW)
          - pattern: crypto.createHash("sha1").update($PW)
          - pattern: crypto.createHash("sha256").update($PW)
      - metavariable-regex:
          metavariable: $PW
          regex: (?i)(pass|pwd|passwd|secret|credential)

  - id: patronus-weak-password-hash-python
    languages: [python]
    severity: ERROR
    message: >-
      A password appears to be hashed with a fast, general-purpose hash
      (md5/sha1/sha256). Use a slow, salted password hash such as bcrypt,
      scrypt, or argon2 (e.g. via passlib).
    metadata:
      patronus-category: insecure-crypto
      patronus-ai-codegen: true
      patronus-remediation: "Use passlib/bcrypt: bcrypt.hashpw(password, bcrypt.gensalt())."
      cwe:
        - "CWE-916: Use of Password Hash With Insufficient Computational Effort"
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: hashlib.md5($PW)
          - pattern: hashlib.sha1($PW)
          - pattern: hashlib.sha256($PW)
      - metavariable-regex:
          metavariable: $PW
          regex: (?i)(pass|pwd|passwd|secret|credential)
