rules:
  - id: patronus-graphql-introspection-enabled
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      GraphQL introspection is explicitly enabled (introspection:true). In
      production this lets anyone enumerate your entire schema, easing attack
      planning. Gate introspection behind a non-production environment check.
    metadata:
      patronus-category: insecure-config
      patronus-ai-codegen: true
      patronus-remediation: "introspection: process.env.NODE_ENV !== 'production'."
      cwe:
        - "CWE-200: Exposure of Sensitive Information to an Unauthorized Actor"
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: 'new ApolloServer({..., introspection: true, ...})'
          - pattern: 'new $SERVER({..., introspection: true, playground: true, ...})'
