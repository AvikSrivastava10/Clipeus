rules:
  - id: clipeus-error-stack-to-client-js
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      An error stack trace is sent in the HTTP response. Stack traces leak file
      paths, dependency versions, and internal logic that aid attackers. Log the
      error server-side and return a generic message to the client.
    metadata:
      clipeus-category: info-disclosure
      clipeus-ai-codegen: true
      clipeus-remediation: "Log err server-side; respond with a generic message and a request id."
      cwe:
        - "CWE-209: Generation of Error Message Containing Sensitive Information"
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: $RES.send($ERR.stack)
          - pattern: $RES.status($CODE).send($ERR.stack)
          - pattern: '$RES.json({..., $KEY: $ERR.stack, ...})'
          - pattern: '$RES.status($CODE).json({..., $KEY: $ERR.stack, ...})'

  - id: clipeus-traceback-to-client-python
    languages: [python]
    severity: WARNING
    message: >-
      A full traceback is returned to the client. Tracebacks expose source
      paths and internal state. Log the traceback server-side and return a
      generic error.
    metadata:
      clipeus-category: info-disclosure
      clipeus-ai-codegen: true
      clipeus-remediation: "Log traceback.format_exc() server-side; return a generic error message."
      cwe:
        - "CWE-209: Generation of Error Message Containing Sensitive Information"
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: return traceback.format_exc()
          - pattern: return $X, traceback.format_exc()
